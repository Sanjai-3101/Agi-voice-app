<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Cloud Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
        <h1 class="text-3xl font-bold mb-2">🎙️ AGI Cloud Voice Agent</h1>
        <p class="text-slate-400 text-sm mb-6">Hosted entirely on Render. No local servers required.</p>

        <button id="micBtn" onclick="startListening()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-4 px-8 rounded-full transition duration-200 transform active:scale-95 shadow-lg flex items-center justify-center gap-3 mx-auto">
            <span id="btnText">Click to Speak</span>
        </button>

        <div class="mt-6 bg-slate-900 rounded-lg p-4 border border-slate-700/50 text-left space-y-2">
            <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Status Log</p>
            <p id="transcript" class="text-sm text-indigo-300 italic">Waiting for command...</p>
            <p id="status" class="text-xs text-slate-400"></p>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const btnText = document.getElementById('btnText');
        const transcriptEl = document.getElementById('transcript');
        const statusEl = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert("Your browser does not support Web Speech API. Please use Google Chrome, Edge, or Safari.");
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';

            function startListening() {
                recognition.start();
                btnText.innerText = "🔴 Listening...";
                micBtn.classList.replace('bg-indigo-600', 'bg-red-600');
                statusEl.innerText = "Speak into your microphone...";
            }

            recognition.onresult = async (event) => {
                const userCommand = event.results[0][0].transcript;
                transcriptEl.innerText = `"${userCommand}"`;
                btnText.innerText = "🔄 Processing...";
                micBtn.classList.replace('bg-red-600', 'bg-amber-600');

                try {
                    // Send voice text directly to Render endpoint
                    const response = await fetch('/agent', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text_command: userCommand })
                    });

                    const data = await response.json();

                    if (data.action === "open_tab") {
                        statusEl.innerText = `Opening: ${data.url}`;
                        // Open the URL directly in the browser
                        window.open(data.url, '_blank');
                    } else {
                        statusEl.innerText = "No actionable response received.";
                    }
                } catch (err) {
                    statusEl.innerText = "Error contacting server: " + err.message;
                } finally {
                    btnText.innerText = "Click to Speak";
                    micBtn.className = "bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-4 px-8 rounded-full transition duration-200 transform active:scale-95 shadow-lg flex items-center justify-center gap-3 mx-auto";
                }
            };

            recognition.onerror = (event) => {
                statusEl.innerText = "Error detected: " + event.error;
                btnText.innerText = "Click to Speak";
                micBtn.className = "bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-4 px-8 rounded-full transition duration-200 transform active:scale-95 shadow-lg flex items-center justify-center gap-3 mx-auto";
            };
        }
    </script>
</body>
</html>
